<style>
/* ==============================
   DESIGN TOKENS
   ============================== */
:root {
  /* Surfaces */
  --bg-base: #0f1419;
  --bg-raised: #161b22;
  --bg-card: #1c2128;
  --bg-card-hover: #21262d;
  --bg-input: #0d1117;
  --border-default: rgba(255, 255, 255, 0.08);
  --border-emphasis: rgba(255, 255, 255, 0.15);

  /* Text */
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --text-faint: #484f58;

  /* Category Colors */
  --color-ai: #2dd4bf;
  --color-health: #f87171;
  --color-entertainment: #c084fc;
  --color-productivity: #60a5fa;
  --color-cloud: #4ade80;
  --color-memberships: #fbbf24;
  --color-apple: #6b7280;
  --color-inactive: #4b5563;

  /* Semantic */
  --color-active: #2dd4bf;
  --color-cancelled: #ef4444;
  --color-keeping: #22c55e;
  --color-savings: #f59e0b;
  --color-accent: #06b6d4;

  /* Spacing (4px system) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* Type Scale */
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.9375rem;
  --text-lg: 1.125rem;
  --text-xl: 1.375rem;
  --text-2xl: 1.75rem;
  --text-3xl: 2.25rem;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;

  /* Transitions */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
}

/* ==============================
   RESET & BASE
   ============================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: var(--text-primary);
  background: var(--bg-base);
}

body {
  min-height: 100dvh;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ==============================
   LAYOUT
   ============================== */
.app-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--space-4) var(--space-4) var(--space-12);
}

@media (min-width: 768px) {
  .app-container {
    padding: var(--space-8) var(--space-6) var(--space-12);
  }
}

/* ==============================
   HEADER
   ============================== */
.app-header {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-6);
  padding-bottom: var(--space-4);
  border-bottom: 1px solid var(--border-default);
}

.logo-mark {
  flex-shrink: 0;
}

.header-text h1 {
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.header-text p {
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}

/* ==============================
   KPI CARDS
   ============================== */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-3);
  margin-bottom: var(--space-6);
}

@media (min-width: 768px) {
  .kpi-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: var(--space-4);
  }
}

.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  position: relative;
  overflow: hidden;
}

.kpi-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
}

.kpi-card--spend::before { background: var(--color-accent); }
.kpi-card--savings::before { background: var(--color-savings); }
.kpi-card--count::before { background: var(--color-active); }
.kpi-card--progress::before { background: var(--color-keeping); }

.kpi-label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-2);
}

.kpi-value {
  font-size: var(--text-2xl);
  font-weight: 800;
  font-variant-numeric: tabular-nums lining-nums;
  letter-spacing: -0.03em;
  line-height: 1.1;
  transition: color 400ms var(--ease-out);
}

.kpi-value--spend { color: var(--color-accent); }
.kpi-value--savings { color: var(--color-savings); }
.kpi-value--count { color: var(--text-primary); }

.kpi-sub {
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-top: var(--space-1);
  font-variant-numeric: tabular-nums;
}

/* Progress bar */
.progress-wrap {
  margin-top: var(--space-3);
}

.progress-bar {
  height: 6px;
  background: var(--bg-input);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--color-keeping);
  border-radius: 3px;
  transition: width 500ms var(--ease-out);
}

.progress-label {
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-top: var(--space-1);
  font-variant-numeric: tabular-nums;
}

/* ==============================
   FILTER BAR
   ============================== */
.filter-bar {
  display: flex;
  gap: var(--space-2);
  margin-bottom: var(--space-6);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: var(--space-1);
}

.filter-btn {
  flex-shrink: 0;
  padding: var(--space-2) var(--space-4);
  border-radius: 100px;
  border: 1px solid var(--border-default);
  background: transparent;
  color: var(--text-secondary);
  font-size: var(--text-sm);
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: background var(--transition-interactive),
              color var(--transition-interactive),
              border-color var(--transition-interactive);
  white-space: nowrap;
}

.filter-btn:hover {
  background: var(--bg-card-hover);
  color: var(--text-primary);
}

.filter-btn:active {
  background: var(--bg-card);
}

.filter-btn--active {
  background: var(--color-accent);
  color: #0f1419;
  border-color: var(--color-accent);
  font-weight: 600;
}

.filter-btn--active:hover {
  background: #22d3ee;
  color: #0f1419;
}

.filter-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 20px;
  padding: 0 6px;
  border-radius: 10px;
  font-size: 0.6875rem;
  font-weight: 700;
  margin-left: 6px;
  font-variant-numeric: tabular-nums;
  background: rgba(255,255,255,0.1);
}

.filter-btn--active .filter-count {
  background: rgba(0,0,0,0.2);
}

/* ==============================
   CATEGORY SECTION
   ============================== */
.category-section {
  margin-bottom: var(--space-6);
}

.category-header {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  background: var(--bg-raised);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  cursor: pointer;
  user-select: none;
  margin-bottom: var(--space-3);
  transition: background var(--transition-interactive),
              border-color var(--transition-interactive);
}

.category-header:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-emphasis);
}

.category-header:active {
  background: var(--bg-card);
}

.category-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.category-name {
  font-size: var(--text-base);
  font-weight: 600;
  flex: 1;
}

.category-meta {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.category-total {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}

.category-count {
  font-size: var(--text-xs);
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

.category-chevron {
  width: 16px;
  height: 16px;
  color: var(--text-muted);
  transition: transform 300ms var(--ease-out);
  flex-shrink: 0;
}

.category-header[aria-expanded="false"] .category-chevron {
  transform: rotate(-90deg);
}

.category-cards {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-3);
  overflow: hidden;
  transition: max-height 400ms var(--ease-out),
              opacity 300ms var(--ease-out);
}

@media (min-width: 640px) {
  .category-cards {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1024px) {
  .category-cards {
    grid-template-columns: repeat(3, 1fr);
  }
}

.category-cards--collapsed {
  max-height: 0;
  opacity: 0;
  margin-bottom: 0;
  pointer-events: none;
}

/* ==============================
   SUBSCRIPTION CARD
   ============================== */
.sub-card {
  background: var(--bg-card);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  position: relative;
  overflow: hidden;
  transition: opacity 300ms var(--ease-out),
              border-color 300ms var(--ease-out),
              background 300ms var(--ease-out),
              transform var(--transition-interactive);
}

.sub-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  width: 3px;
}

/* Category left-border colors */
.sub-card[data-category="AI Tools"]::before { background: var(--color-ai); }
.sub-card[data-category="Health & Insurance"]::before { background: var(--color-health); }
.sub-card[data-category="Entertainment"]::before { background: var(--color-entertainment); }
.sub-card[data-category="Productivity & Software"]::before { background: var(--color-productivity); }
.sub-card[data-category="Cloud & Hosting"]::before { background: var(--color-cloud); }
.sub-card[data-category="Memberships & Other"]::before { background: var(--color-memberships); }
.sub-card[data-category="Apple Subscriptions"]::before { background: var(--color-apple); }
.sub-card[data-category="Inactive / Failed"]::before { background: var(--color-inactive); }

/* Not-reviewed pulsing border */
.sub-card--unreviewed {
  border-color: rgba(251, 191, 36, 0.25);
  animation: pulse-border 2.5s ease-in-out infinite;
}

@keyframes pulse-border {
  0%, 100% { border-color: rgba(251, 191, 36, 0.15); }
  50% { border-color: rgba(251, 191, 36, 0.35); }
}

/* Cancelled state */
.sub-card--cancelled {
  opacity: 0.55;
}

.sub-card--cancelled .sub-name {
  text-decoration: line-through;
  text-decoration-color: var(--color-cancelled);
}

/* Card top row */
.sub-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}

.sub-name {
  font-size: var(--text-base);
  font-weight: 600;
  line-height: 1.3;
  flex: 1;
  transition: text-decoration-color 300ms var(--ease-out);
}

.sub-badge {
  flex-shrink: 0;
  font-size: 0.625rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 8px;
  border-radius: 100px;
  transition: opacity 300ms var(--ease-out),
              transform 300ms var(--ease-out);
}

.sub-badge--cancelled {
  background: rgba(239, 68, 68, 0.15);
  color: var(--color-cancelled);
}

.sub-badge--keeping {
  background: rgba(34, 197, 94, 0.15);
  color: var(--color-keeping);
}

/* Cost row */
.sub-cost-row {
  display: flex;
  align-items: baseline;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
}

.sub-cost {
  font-size: var(--text-xl);
  font-weight: 700;
  font-variant-numeric: tabular-nums lining-nums;
  letter-spacing: -0.02em;
}

.sub-cost-period {
  font-size: var(--text-xs);
  color: var(--text-muted);
}

.sub-annual {
  font-size: var(--text-xs);
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

/* Frequency */
.sub-frequency {
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-bottom: var(--space-3);
}

/* Notes */
.sub-notes {
  font-size: var(--text-xs);
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: var(--space-4);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Card actions */
.sub-actions {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-1);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  font-size: var(--text-xs);
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid var(--border-default);
  background: transparent;
  color: var(--text-secondary);
  transition: background var(--transition-interactive),
              color var(--transition-interactive),
              border-color var(--transition-interactive),
              transform var(--transition-interactive);
  white-space: nowrap;
  min-height: 32px;
}

.btn:hover {
  background: var(--bg-card-hover);
  color: var(--text-primary);
  border-color: var(--border-emphasis);
}

.btn:active {
  transform: scale(0.97);
}

.btn--cancel {
  color: var(--color-cancelled);
  border-color: rgba(239, 68, 68, 0.25);
}

.btn--cancel:hover {
  background: rgba(239, 68, 68, 0.1);
  color: var(--color-cancelled);
  border-color: rgba(239, 68, 68, 0.4);
}

.btn--cancel.btn--active {
  background: rgba(239, 68, 68, 0.15);
  color: var(--color-cancelled);
  border-color: rgba(239, 68, 68, 0.3);
}

.btn--keep {
  color: var(--color-keeping);
  border-color: rgba(34, 197, 94, 0.25);
}

.btn--keep:hover {
  background: rgba(34, 197, 94, 0.1);
  color: var(--color-keeping);
  border-color: rgba(34, 197, 94, 0.4);
}

.btn--keep.btn--active {
  background: rgba(34, 197, 94, 0.15);
  color: var(--color-keeping);
  border-color: rgba(34, 197, 94, 0.3);
}

.btn--link {
  color: var(--color-accent);
  border-color: rgba(6, 182, 212, 0.25);
}

.btn--link:hover {
  background: rgba(6, 182, 212, 0.1);
  color: var(--color-accent);
  border-color: rgba(6, 182, 212, 0.4);
}

.btn--link svg {
  width: 12px;
  height: 12px;
}

/* Reviewed checkbox area */
.reviewed-row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-top: var(--space-3);
  padding-top: var(--space-3);
  border-top: 1px solid var(--border-default);
}

.reviewed-checkbox {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border: 1.5px solid var(--border-emphasis);
  border-radius: 4px;
  background: var(--bg-input);
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: background var(--transition-interactive),
              border-color var(--transition-interactive);
}

.reviewed-checkbox:checked {
  background: var(--color-accent);
  border-color: var(--color-accent);
}

.reviewed-checkbox:checked::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 5px;
  width: 5px;
  height: 9px;
  border: solid #0f1419;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.reviewed-checkbox:hover {
  border-color: var(--color-accent);
}

.reviewed-label {
  font-size: var(--text-xs);
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
}

/* ==============================
   CATEGORY SUMMARY
   ============================== */
.category-summary {
  margin-bottom: var(--space-6);
  background: var(--bg-raised);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: var(--space-4);
}

.category-summary h2 {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-3);
}

.cat-summary-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-2);
}

@media (min-width: 480px) {
  .cat-summary-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 768px) {
  .cat-summary-grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

.cat-summary-item {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  min-width: 0;
}

.cat-summary-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.cat-summary-name {
  font-size: var(--text-xs);
  color: var(--text-secondary);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cat-summary-amount {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

/* ==============================
   FOOTER
   ============================== */
.app-footer {
  text-align: center;
  padding: var(--space-8) var(--space-4) var(--space-6);
  border-top: 1px solid var(--border-default);
  margin-top: var(--space-8);
}

.app-footer a {
  color: var(--text-muted);
  font-size: var(--text-xs);
  text-decoration: none;
  transition: color var(--transition-interactive);
}

.app-footer a:hover {
  color: var(--text-secondary);
}

/* ==============================
   ACCESSIBILITY
   ============================== */
:focus-visible {
  outline: 2px solid var(--color-accent);
  outline-offset: 2px;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border-width: 0;
}

/* Skip to content */
.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: var(--color-accent);
  color: #0f1419;
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm);
  font-weight: 600;
  z-index: 100;
  border-radius: 0 0 var(--radius-sm) 0;
  transition: top 200ms var(--ease-out);
}

.skip-link:focus {
  top: 0;
}

/* ==============================
   REDUCED MOTION
   ============================== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ==============================
   EMPTY STATE (when all filtered out)
   ============================== */
.empty-state {
  text-align: center;
  padding: var(--space-12) var(--space-4);
  color: var(--text-muted);
}

.empty-state svg {
  width: 48px;
  height: 48px;
  margin-bottom: var(--space-4);

/* ==============================
   HELPERS
   ============================== */
function fmt(n) {
  if (n >= 1000) {
    return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  return "$" + n.toFixed(2);
}

function fmtCompact(n) {
  if (n >= 10000) {
    return "$" + (n / 1000).toFixed(1) + "k";
  }
  return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

/* ==============================
   KPI ANIMATION
   ============================== */
const kpiState = { spend: 0, savings: 0 };

function animateValue(el, start, end, duration, formatter) {
  const startTime = performance.now();
  function step(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = start + (end - start) * eased;
    el.textContent = formatter(current);
    if (progress < 1) {
      requestAnimationFrame(step);
    }
  }
  requestAnimationFrame(step);
}

function updateKPIs() {
  const active = subscriptions.filter(s => !s.cancelled);
  const cancelled = subscriptions.filter(s => s.cancelled);
  const reviewed = subscriptions.filter(s => s.reviewed);
  const total = subscriptions.length;

  const activeSpend = active.reduce((sum, s) => sum + s.monthlyCost, 0);
  const cancelledSavings = cancelled.reduce((sum, s) => sum + s.monthlyCost, 0);

  const spendEl = document.getElementById("kpi-spend");
  const savingsEl = document.getElementById("kpi-savings");

  animateValue(spendEl, kpiState.spend, activeSpend, 500, fmt);
  animateValue(savingsEl, kpiState.savings, cancelledSavings, 500, fmt);

  kpiState.spend = activeSpend;
  kpiState.savings = cancelledSavings;

  document.getElementById("kpi-spend-annual").textContent = fmt(activeSpend * 12) + "/yr est.";
  document.getElementById("kpi-savings-annual").textContent = fmt(cancelledSavings * 12) + "/yr est.";

  document.getElementById("kpi-count").textContent = active.length + " / " + total;
  document.getElementById("kpi-count-sub").textContent = active.length + " active \u00B7 " + cancelled.length + " cancelled";

  const pct = total > 0 ? Math.round((reviewed.length / total) * 100) : 0;
  document.getElementById("kpi-progress").textContent = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-label").textContent = reviewed.length + " of " + total + " reviewed";

  // Update filter counts
  document.getElementById("filter-count-all").textContent = total;
  document.getElementById("filter-count-active").textContent = active.length;
  document.getElementById("filter-count-cancelled").textContent = cancelled.length;
  document.getElementById("filter-count-not-reviewed").textContent = subscriptions.filter(s => !s.reviewed).length;
}

/* ==============================
   CATEGORY SUMMARY
   ============================== */
function updateCategorySummary() {
  const grid = document.getElementById("cat-summary-grid");
  grid.innerHTML = "";

  categoryOrder.forEach(cat => {
    const items = subscriptions.filter(s => s.category === cat && !s.cancelled);
    const catTotal = items.reduce((sum, s) => sum + s.monthlyCost, 0);

    const div = document.createElement("div");
    div.className = "cat-summary-item";
    div.innerHTML = '<span class="cat-summary-dot" style="background:' + categoryColors[cat] + '"></span>' +
      '<span class="cat-summary-name">' + cat + '</span>' +
      '<span class="cat-summary-amount">' + fmt(catTotal) + '</span>';
    grid.appendChild(div);
  });
}

/* ==============================
   RENDER
   ============================== */
function getFilteredSubs() {
  switch (currentFilter) {
    case "active": return subscriptions.filter(s => !s.cancelled);
    case "cancelled": return subscriptions.filter(s => s.cancelled);
    case "not-reviewed": return subscriptions.filter(s => !s.reviewed);
    default: return subscriptions;
  }
}

function renderCards() {
  const container = document.getElementById("subscriptions-container");
  const emptyState = document.getElementById("empty-state");
  container.innerHTML = "";

  const filtered = getFilteredSubs();

  if (filtered.length === 0) {
    emptyState.style.display = "block";
    return;
  }
  emptyState.style.display = "none";

  const grouped = {};
  categoryOrder.forEach(cat => { grouped[cat] = []; });
  filtered.forEach(s => {
    if (grouped[s.category]) {
      grouped[s.category].push(s);
    }
  });

  categoryOrder.forEach(cat => {
    const items = grouped[cat];
    if (!items || items.length === 0) return;

    const catActive = items.filter(s => !s.cancelled);
    const catTotal = catActive.reduce((sum, s) => sum + s.monthlyCost, 0);
    const isCollapsed = collapsedCategories[cat] === true;

    const section = document.createElement("section");
    section.className = "category-section";

    // Category header
    const header = document.createElement("button");
    header.className = "category-header";
    header.type = "button";
    header.setAttribute("aria-expanded", isCollapsed ? "false" : "true");
    header.setAttribute("aria-label", "Toggle " + cat + " category");
    header.innerHTML =
      '<span class="category-dot" style="background:' + categoryColors[cat] + '"></span>' +
      '<span class="category-name">' + cat + '</span>' +
      '<span class="category-meta">' +
        '<span class="category-total">' + fmt(catTotal) + '/mo</span>' +
        '<span class="category-count">' + items.length + ' items</span>' +
      '</span>' +
      '<svg class="category-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6l4 4 4-4"/></svg>';

    header.addEventListener("click", function() {
      collapsedCategories[cat] = !collapsedCategories[cat];
      const cards = section.querySelector(".category-cards");
      const expanded = !collapsedCategories[cat];
      header.setAttribute("aria-expanded", expanded ? "true" : "false");
      if (expanded) {
        cards.classList.remove("category-cards--collapsed");
        cards.style.maxHeight = cards.scrollHeight + "px";
        cards.style.opacity = "1";
        cards.style.pointerEvents = "auto";
        setTimeout(function() { cards.style.maxHeight = "none"; }, 400);
      } else {
        cards.style.maxHeight = cards.scrollHeight + "px";
        requestAnimationFrame(function() {
          cards.classList.add("category-cards--collapsed");
          cards.style.maxHeight = "0";
          cards.style.opacity = "0";
          cards.style.pointerEvents = "none";
        });
      }
    });

    section.appendChild(header);

    // Cards container
    const cardsDiv = document.createElement("div");
    cardsDiv.className = "category-cards" + (isCollapsed ? " category-cards--collapsed" : "");
    if (isCollapsed) {
      cardsDiv.style.maxHeight = "0";
      cardsDiv.style.opacity = "0";
      cardsDiv.style.pointerEvents = "none";
    }

    items.forEach(sub => {
      const card = document.createElement("div");
      card.className = "sub-card";
      card.dataset.category = sub.category;
      card.dataset.id = sub.id;

      if (sub.cancelled) card.classList.add("sub-card--cancelled");
      if (!sub.reviewed) card.classList.add("sub-card--unreviewed");

      const annual = sub.monthlyCost * 12;
      let badgeHTML = "";
      if (sub.cancelled) {
        badgeHTML = '<span class="sub-badge sub-badge--cancelled">Cancelled</span>';
      } else if (sub.reviewed) {
        badgeHTML = '<span class="sub-badge sub-badge--keeping">Keeping</span>';
      }

      let linkBtn = "";
      if (sub.cancelUrl) {
        linkBtn = '<a href="' + sub.cancelUrl + '" target="_blank" rel="noopener noreferrer" class="btn btn--link" aria-label="Manage ' + sub.name + '">' +
          '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h7v7"/><path d="M13 3L6 10"/></svg>' +
          'Manage</a>';
      }

      card.innerHTML =
        '<div class="sub-card-top">' +
          '<span class="sub-name">' + sub.name + '</span>' +
          badgeHTML +
        '</div>' +
        '<div class="sub-cost-row">' +
          '<span class="sub-cost">' + fmt(sub.monthlyCost) + '</span>' +
          '<span class="sub-cost-period">/mo</span>' +
        '</div>' +
        '<div class="sub-annual">' + fmt(annual) + '/yr est.</div>' +
        '<div class="sub-frequency">' + sub.frequency + '</div>' +
        '<div class="sub-notes">' + sub.notes + '</div>' +
        '<div class="sub-actions">' +
          '<button type="button" class="btn btn--cancel' + (sub.cancelled ? ' btn--active' : '') + '" data-action="cancel" data-id="' + sub.id + '">' +
            (sub.cancelled ? "\u2717 Undo Cancel" : "\u2717 Cancel") +
          '</button>' +
          '<button type="button" class="btn btn--keep' + (!sub.cancelled && sub.reviewed ? ' btn--active' : '') + '" data-action="keep" data-id="' + sub.id + '">' +
            (!sub.cancelled && sub.reviewed ? "\u2713 Keeping" : "\u2713 Keep") +
          '</button>' +
          linkBtn +
        '</div>' +
        '<div class="reviewed-row">' +
          '<input type="checkbox" class="reviewed-checkbox" id="rev-' + sub.id + '" data-id="' + sub.id + '"' + (sub.reviewed ? ' checked' : '') + '>' +
          '<label class="reviewed-label" for="rev-' + sub.id + '">Reviewed</label>' +
        '</div>';

      cardsDiv.appendChild(card);
    });

    section.appendChild(cardsDiv);
    container.appendChild(section);
  });
}

/* ==============================
   EVENT DELEGATION
   ============================== */
document.getElementById("subscriptions-container").addEventListener("click", function(e) {
  const cancelBtn = e.target.closest("[data-action='cancel']");
  const keepBtn = e.target.closest("[data-action='keep']");

  if (cancelBtn) {
    const id = parseInt(cancelBtn.dataset.id, 10);
    const sub = subscriptions.find(s => s.id === id);
    if (sub) {
      sub.cancelled = !sub.cancelled;
      if (sub.cancelled) {
        sub.reviewed = true;
      }
      refresh();
    }
    return;
  }

  if (keepBtn) {
    const id = parseInt(keepBtn.dataset.id, 10);
    const sub = subscriptions.find(s => s.id === id);
    if (sub) {
      if (!sub.cancelled) {
        sub.reviewed = !sub.reviewed;
      }
      refresh();
    }
    return;
  }
});

document.getElementById("subscriptions-container").addEventListener("change", function(e) {
  if (e.target.classList.contains("reviewed-checkbox")) {
    const id = parseInt(e.target.dataset.id, 10);
    const sub = subscriptions.find(s => s.id === id);
    if (sub) {
      sub.reviewed = e.target.checked;
      refresh();
    }
  }
});

// Filter buttons
document.querySelector(".filter-bar").addEventListener("click", function(e) {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;

  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("filter-btn--active"));
  btn.classList.add("filter-btn--active");
  currentFilter = btn.dataset.filter;
  renderCards();
});

/* ==============================
   REFRESH
   ============================== */
function refresh() {
  updateKPIs();
  updateCategorySummary();
  renderCards();
  saveState();
}

/* ==============================
   PERSISTENCE (localStorage)
   ============================== */
function saveState() {
  try {
    const state = subscriptions.map(s => ({ id: s.id, cancelled: s.cancelled, reviewed: s.reviewed }));
    localStorage.setItem('subtracker_state', JSON.stringify(state));
    localStorage.setItem('subtracker_updated', new Date().toISOString());
  } catch(e) { /* storage unavailable in sandboxed iframes */ }
}

function loadState() {
  try {
    const saved = localStorage.getItem('subtracker_state');
    if (!saved) return;
    const state = JSON.parse(saved);
    state.forEach(s => {
      const sub = subscriptions.find(x => x.id === s.id);
      if (sub) {
        sub.cancelled = s.cancelled;
        sub.reviewed = s.reviewed;
      }
    });
  } catch(e) { /* storage unavailable in sandboxed iframes */ }
}

/* ==============================
   INIT
   ============================== */
loadState();
refresh();
</script>
